<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond violet arrondi -->
  <rect width="512" height="512" rx="96" fill="#1e1b2e"/>
  <!-- Lueur douce derrière la croix -->
  <ellipse cx="256" cy="260" rx="100" ry="130" fill="#f4a261" opacity="0.12"/>
  <!-- Barre verticale de la croix -->
  <rect x="228" y="88" width="56" height="336" rx="10" fill="#f4a261"/>
  <!-- Barre horizontale de la croix -->
  <rect x="128" y="196" width="256" height="56" rx="10" fill="#f4a261"/>
  <!-- Reflet subtil en haut de la barre verticale -->
  <rect x="240" y="88" width="18" height="120" rx="9" fill="white" opacity="0.18"/>
</svg>
